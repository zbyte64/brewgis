  - name: emp_ind
    tests: [non_negative]
  - name: emp_ag
    tests: [non_negative]
  - name: emp_military
    tests: [non_negative]
  - name: emp_retail_services
    tests: [non_negative]
  - name: emp_restaurant
    tests: [non_negative]
  - name: emp_accommodation
    tests: [non_negative]
  - name: emp_arts_entertainment
    tests: [non_negative]
  - name: emp_other_services
    tests: [non_negative]
  - name: emp_office_services
    tests: [non_negative]
  - name: emp_medical_services
    tests: [non_negative]
  - name: emp_public_admin
    tests: [non_negative]
  - name: emp_education
    tests: [non_negative]
  - name: emp_manufacturing
    tests: [non_negative]
  - name: emp_wholesale
    tests: [non_negative]
  - name: emp_transport_warehousing
    tests: [non_negative]
  - name: emp_utilities
