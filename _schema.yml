
- name: base_canvas_demographics
  description: "Base canvas demographics — area-weighted spatial allocation from Census ACS block groups. Reads parcel geometries from base_canvas_geometry and allocates pop, hh, du, du sub-types, median_income, and equity columns from census.acs_block_group."
  columns:
  - name: parcel_id
    description: "Unique parcel identifier"
    tests:
    - not_null
    - unique
  - name: pop
    description: "Total population (from ACS, area-proportional allocated)"
    tests:
    - non_negative
  - name: hh
    description: "Total households"
    tests:
    - non_negative
  - name: du
    description: "Total dwelling units"
    tests:
    - non_negative
  - name: du_detsf_sl
    tests: [non_negative]
  - name: du_detsf_ll
    tests: [non_negative]
  - name: du_attsf
    tests: [non_negative]
  - name: du_mf
    tests: [non_negative]
  - name: du_mf2to4
    tests: [non_negative]
  - name: du_mf5p
    tests: [non_negative]
  - name: median_income
    tests: [non_negative]
  - name: rent_burden_pct
    tests: [non_negative]
  - name: pct_minority
    tests: [non_negative]
  - name: pct_college_educated
    tests: [non_negative]
  - name: cost_burden_pct
    tests: [non_negative]
  - name: area_gross
    tests: [not_null, non_negative]
  - name: intersection_density
    tests: [non_negative]
  - name: county
  - name: geometry

- name: base_canvas_employment
  description: "Base canvas employment — area-weighted spatial allocation from LEHD LODES WAC. Reads demographics and allocates employment sub-sectors (retail, office, public, industrial, agriculture, military) from lehd.wac_block."
  columns:
  - name: parcel_id
    description: "Unique parcel identifier"
    tests:
    - not_null
    - unique
  - name: emp
    description: "Total employment"
    tests:
    - non_negative
  - name: emp_ret
    tests: [non_negative]
  - name: emp_off
    tests: [non_negative]
  - name: emp_pub
    tests: [non_negative]
  - name: emp_ind
    tests: [non_negative]
  - name: emp_ag
    tests: [non_negative]
  - name: emp_military
    tests: [non_negative]
  - name: emp_retail_services
    tests: [non_negative]
  - name: emp_restaurant
    tests: [non_negative]
  - name: emp_accommodation
    tests: [non_negative]
  - name: emp_arts_entertainment
    tests: [non_negative]
  - name: emp_other_services
    tests: [non_negative]
  - name: emp_office_services
    tests: [non_negative]
  - name: emp_medical_services
    tests: [non_negative]
  - name: emp_public_admin
    tests: [non_negative]
  - name: emp_education
    tests: [non_negative]
  - name: emp_manufacturing
    tests: [non_negative]
  - name: emp_wholesale
    tests: [non_negative]
  - name: emp_transport_warehousing
    tests: [non_negative]
  - name: emp_utilities
    tests: [non_negative]
  - name: emp_construction
    tests: [non_negative]
  - name: emp_agriculture
    tests: [non_negative]
  - name: emp_extraction
    tests: [non_negative]
  - name: area_gross
    tests: [not_null, non_negative]
  - name: intersection_density
    tests: [non_negative]

- name: parcel_bft_classification
  description: "Per-parcel built_form_key with 6-tier classification and source tracking. Split from parcel_dasymetric_weights for independent incremental rebuilds."
  columns:
  - name: apn
    description: "Assessor parcel number"
    tests:
    - unique
    - not_null
  - name: built_form_key_source
    description: "Which tier provided the final classification (tier1/tier0/tier2/tier3/tier3b/tier4)"
    tests:
    - not_null

- name: parcel_known_features
  description: "Materialized known-parcel table with built_form_key and feature columns for k-NN imputation"
  columns:
  - name: apn
    description: "Assessor parcel number"
    tests:
    - not_null
    - unique

- name: parcel_partition_stats
  description: "Per-category standard deviations for k-NN distance normalization"
  columns:
  - name: land_development_category
    description: "Land development category"
    tests:
    - not_null

- name: parcel_dasymetric_weights
  description: "Per-parcel dasymetric weights for population and employment allocation. Reads classification from parcel_bft_classification and computes weights from authoritative_residential_area."
  columns:
  - name: apn
    description: "Assessor parcel number"
    tests:
    - unique
    - not_null
  - name: pop_dasym_weight
    description: "Population dasymetric weight"
    tests:
    - not_null
    - non_negative
  - name: emp_dasym_weight
    description: "Employment dasymetric weight"
    tests:
    - not_null
    - non_negative

- name: sacog_assessor_parcels
  description: "Deduplicated SACOG assessor parcel geometries"
  columns:
  - name: apn
    description: "Assessor parcel number"
    tests:
    - unique
    - not_null

- name: parcel_building_footprints
  description: "Per-parcel building footprint features from combined (Overture + VIDA) sources"
  columns:
  - name: apn
    description: "Assessor parcel number"
    tests:
    - unique
    - not_null

- name: parcel_building_sqft_by_type
  description: "Per-parcel building sqft broken into residential, commercial, industrial, other"
  columns:
  - name: apn
    description: "Assessor parcel number"
    tests:
    - unique
    - not_null

- name: overture_intersection_density
  description: "Per-parcel intersection density from Overture transport road segments"
  columns:
  - name: apn
    description: "Assessor parcel number"
    tests:
    - unique
    - not_null

- name: authoritative_residential_area
  description: "Per-parcel authoritative residential/non-residential building area from observational data"
  columns:
  - name: apn
    description: "Assessor parcel number"
    tests:
    - unique
    - not_null

- name: parcel_footprint_imputed
  description: "Per-parcel k-NN imputation of building characteristics for parcels without sales data"
  columns:
  - name: apn
    description: "Assessor parcel number"
    tests:
    - unique
    - not_null

- name: overture_land_use_parcel
  description: "Overture land use per parcel via spatial join"
  columns:
  - name: parcel_id
    description: "Unique parcel identifier"
    tests:
    - unique
    - not_null

- name: parcel_block_groups
  description: "Parcel-to-block-group assignment via spatial join"
  columns:
  - name: apn
    description: "Assessor parcel number"
    tests:
    - unique
    - not_null
  - name: data_year
    description: "Year of the block group vintage"
    tests:
    - not_null

- name: parcel_du_estimation
  description: "Per-parcel dwelling unit estimation via 6-tier cascade"
  columns:
  - name: apn
    description: "Assessor parcel number"
    tests:
    - unique
    - not_null

- name: base_canvas_reconciled
  description: "Base canvas reconciled — final ETL output with aggregate columns recomputed from sub-column sums. This is the end state equivalent of the full 11-step Python ETL pipeline."
  columns:
  - name: parcel_id
    description: "Unique parcel identifier"
    tests:
    - not_null
    - unique
  - name: area_gross
    description: "Gross parcel area in acres"
    tests:
    - not_null
    - non_negative
  - name: area_parcel
    description: "Parcel area after right-of-way discount"
    tests:
    - not_null
    - non_negative
  - name: pop
    description: "Total population"
    tests:
    - not_null
    - non_negative
  - name: hh
    description: "Total households"
    tests:
    - not_null
    - non_negative
  - name: du
    description: "Total dwelling units"
    tests:
    - not_null
    - non_negative
  - name: emp
    description: "Total employment"
    tests:
    - not_null
    - non_negative
  - name: intersection_density
    description: "Intersection density per square mile (calibrated)"
    tests:
    - not_null
    - non_negative
