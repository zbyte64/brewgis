exclude: '^docs/|/migrations/|devcontainer.json'
default_stages: [pre-commit]

default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: detect-private-key

  - repo: https://github.com/adamchainz/django-upgrade
    rev: '1.30.0'
    hooks:
      - id: django-upgrade
        args: ['--target-version', '6.0']

  # Run the Ruff linter.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      # Linter
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # Formatter
      - id: ruff-format

  - repo: https://github.com/Riverside-Healthcare/djLint
    rev: v1.36.1
    hooks:
      - id: djlint-reformat-django
      - id: djlint-django

  # SQL linting for dbt models
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: v3.3.0
    hooks:
      - id: sqlfluff-lint
        additional_dependencies:
          - sqlfluff-templater-dbt>=3.3.0
        files: ^brewgis/dbt_project/.*\.(sql|yml)$
        args: [--config, .sqlfluff]


  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: [--ignore-words-list, 'histrogram']
        exclude: >
          (?x)^(
            .*\.lock|
            .*\.min\.js|
            .*\.svg|
            .*\.map
          )$

  # JS/TS formatting via prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, typescript, tsx, json, yaml, css, markdown]
        additional_dependencies:
          - prettier@3.5.0

  # JS/TS linting via eslint
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.22.0
    hooks:
      - id: eslint
        files: \.[jt]sx?$
        types: [file]
        additional_dependencies:
          - eslint@9.22.0
          - '@eslint/js@9.22.0'
          - typescript-eslint@8.26.0
          - eslint-config-prettier@10.1.0
          - typescript@5.7.3

  # TypeScript type checking
  - repo: local
    hooks:
      - id: tsc
        name: tsc --noEmit
        entry: npx tsc --noEmit
        language: node
        files: ^js/src/.*\.ts$
        pass_filenames: false
  # Prevent @method_decorator misuse on function-based views
  - repo: local
    hooks:
      - id: check-method-decorator
        name: Check @method_decorator not used on FBVs
        entry: python scripts/check-method-decorator.py
        language: python
        files: ^brewgis/.*\.py$
        pass_filenames: false
  # Python type checking via mypy
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy brewgis
        language: python
        files: ^brewgis/.*\.py$
        pass_filenames: false
        additional_dependencies:
          - django-stubs
          - mypy
          - mypy_django_plugin
          - djangorestframework-stubs
# sets up .pre-commit-ci.yaml to ensure pre-commit dependencies stay up to date
ci:
  autoupdate_schedule: weekly
  skip: []
  submodules: false
