test_AT_with_residential_sqft_low_levels_tier2_mf2to4:
  model: brewgis.assessor.parcel_bft_classification
  gateway: postgis
  inputs:
    brewgis.assessor.sacog_assessor_parcels:
      rows:
        - apn: "TEST_AT_T2_001"
          lot_size_acres: 1.0
          landuse: "ATA00A"
          zone: "R-3"
          geometry: "POLYGON((-121.5 38.5,-121.49 38.5,-121.49 38.51,-121.5 38.51,-121.5 38.5))"
          land_development_category: "urban"
      columns:
        geometry: GEOMETRY
        apn: TEXT
        lot_size_acres: DOUBLE
        landuse: TEXT
        zone: TEXT
        land_development_category: TEXT
    brewgis.assessor.parcel_building_sqft_by_type:
      rows:
        - apn: "TEST_AT_T2_001"
          total_footprint_sqft: 10000.0
          building_count: 2
          footprint_ratio: 0.1
          lot_size_acres: 1.0
          residential_building_sqft: 6000.0
          commercial_building_sqft: 0.0
          industrial_building_sqft: 0.0
          other_building_sqft: 4000.0
          max_levels: 2
          land_development_category: "urban"
          geometry: "POLYGON((-121.5 38.5,-121.49 38.5,-121.49 38.51,-121.5 38.51,-121.5 38.5))"
      columns:
        geometry: GEOMETRY
    brewgis.assessor.sacog_assessor_sales_deduped:
      rows: []
      columns:
        apn: TEXT
        actual_living_sqft: DOUBLE
        actual_building_sqft: DOUBLE
        property_type: TEXT
        sales_lot_size_acres: DOUBLE
        units: INTEGER
    brewgis.assessor.overture_intersection_density:
      rows: []
      columns:
        apn: TEXT
        intersection_density: DOUBLE
    brewgis.assessor.parcel_known_features:
      rows: []
      columns:
        apn: TEXT
        geometry: GEOMETRY
        built_form_key: TEXT
        lot_size_acres: DOUBLE
        intersection_density: DOUBLE
        footprint_ratio: DOUBLE
        land_development_category: TEXT
    brewgis.assessor.parcel_partition_stats:
      rows: []
      columns:
        land_development_category: TEXT
        s_int_dens: DOUBLE
        s_ls: DOUBLE
        s_fr: DOUBLE
  outputs:
    query:
      partial: true
      rows:
        - apn: "TEST_AT_T2_001"
          built_form_key: "mf2to4"
          built_form_key_source: "tier2"
          du_subtype: "mf2to4"
          is_residential: 1

