test_A3_landuse_to_attsf:
  model: brewgis.assessor.parcel_bft_tier0_landuse
  gateway: postgis
  inputs:
    brewgis.assessor.sacog_assessor_parcels:
      rows:
        - apn: "TEST_T0_A3_001"
          lot_size_acres: 0.5
          landuse: "A300A"
          zone: "R-2"
          geometry: "POLYGON((-121.5 38.5,-121.49 38.5,-121.49 38.51,-121.5 38.51,-121.5 38.5))"
          land_development_category: "urban"
      columns:
        geometry: GEOMETRY
        apn: TEXT
        lot_size_acres: DOUBLE
        landuse: TEXT
        zone: TEXT
        land_development_category: TEXT
    brewgis.assessor.overture_intersection_density:
      rows:
        - apn: "TEST_T0_A3_001"
          intersection_density: 50.0
      columns:
        apn: TEXT
        intersection_density: DOUBLE
  outputs:
    query:
      partial: true
      rows:
        - apn: "TEST_T0_A3_001"
          built_form_key: "attsf"


