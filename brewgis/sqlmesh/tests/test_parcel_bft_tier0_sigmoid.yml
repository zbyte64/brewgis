test_SL_dense_urban:
  model: brewgis.assessor.parcel_bft_tier0_landuse
  gateway: postgis
  inputs:
    brewgis.assessor.sacog_assessor_parcels:
      rows:
        - apn: "TEST_SL_DENSE"
          lot_size_acres: 0.15
          landuse: "A1"
          zone: "R-1"
          geometry: "POLYGON((-121.5 38.5,-121.49 38.5,-121.49 38.51,-121.5 38.51,-121.5 38.5))"
          land_development_category: "urban"
      columns:
        geometry: GEOMETRY
        apn: TEXT
        lot_size_acres: DOUBLE
        landuse: TEXT
        zone: TEXT
        land_development_category: TEXT
    brewgis.assessor.overture_intersection_density:
      rows:
        - apn: "TEST_SL_DENSE"
          intersection_density: 300.0
          geometry: "POLYGON((-121.5 38.5,-121.49 38.5,-121.49 38.51,-121.5 38.51,-121.5 38.5))"
      columns:
        apn: TEXT
        intersection_density: DOUBLE
        geometry: GEOMETRY
  outputs:
    query:
      partial: true
      rows:
        - apn: "TEST_SL_DENSE"
          built_form_key: "bt__medium_density_detached_residential"

