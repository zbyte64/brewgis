test_AQ_undeveloped_tier0:
  model: brewgis.assessor.parcel_bft_classification
  gateway: postgis
  inputs:
    brewgis.assessor.parcel_bft_resolved:
      rows:
        - apn: "TEST_AQ_001"
          built_form_key: "undeveloped"
          built_form_key_source: "tier0"
          du_subtype: null
          is_residential: 0
      columns:
        apn: TEXT
        built_form_key: TEXT
        built_form_key_source: TEXT
        du_subtype: TEXT
        is_residential: INTEGER
    brewgis.assessor.sacog_assessor_parcels:
      rows:
        - apn: "TEST_AQ_001"
          lot_size_acres: 5.0
          landuse: "AQA00A"
          zone: "W"
          geometry: "POLYGON((-121.5 38.5,-121.49 38.5,-121.49 38.51,-121.5 38.51,-121.5 38.5))"
          land_development_category: "undeveloped"
      columns:
        geometry: GEOMETRY
        apn: TEXT
        lot_size_acres: DOUBLE
        landuse: TEXT
        zone: TEXT
        land_development_category: TEXT
    brewgis.assessor.sacog_assessor_sales_deduped:
      rows: []
      columns:
        apn: TEXT
        actual_living_sqft: DOUBLE
        actual_building_sqft: DOUBLE
        property_type: TEXT
        sales_lot_size_acres: DOUBLE
        units: INTEGER
    brewgis.assessor.parcel_building_sqft_by_type:
      rows: []
      columns:
        apn: TEXT
        total_footprint_sqft: DOUBLE
        building_count: INTEGER
        footprint_ratio: DOUBLE
        lot_size_acres: DOUBLE
        residential_building_sqft: DOUBLE
        commercial_building_sqft: DOUBLE
        industrial_building_sqft: DOUBLE
        other_building_sqft: DOUBLE
        residential_building_count: INTEGER
        non_residential_building_count: INTEGER
        max_levels: INTEGER
        land_development_category: TEXT
        geometry: GEOMETRY
    brewgis.assessor.overture_intersection_density:
      rows: []
      columns:
        apn: TEXT
        intersection_density: DOUBLE
  outputs:
    query:
      partial: true
      rows:
        - apn: "TEST_AQ_001"
          built_form_key: "undeveloped"
          built_form_key_source: "tier0"
          du_subtype: null
          is_residential: 0

