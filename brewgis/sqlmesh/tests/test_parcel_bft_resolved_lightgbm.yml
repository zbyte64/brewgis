test_resolved_lightgbm_takes_priority_over_tier3b:
  model: brewgis.assessor.parcel_bft_resolved
  gateway: postgis
  inputs:
    brewgis.assessor.sacog_assessor_parcels:
      rows:
        - apn: "TEST_LGBM_PRIORITY_001"
          lot_size_acres: 0.5
          landuse: "A1000A"
          zone: "R-3"
          geometry: "POLYGON((-121.5 38.5,-121.49 38.5,-121.49 38.51,-121.5 38.51,-121.5 38.5))"
          land_development_category: "urban"
      columns:
        geometry: GEOMETRY
        apn: TEXT
        lot_size_acres: DOUBLE
        landuse: TEXT
        zone: TEXT
        land_development_category: TEXT
    brewgis.assessor.parcel_bft_tier1_sales:
      rows: []
      columns:
        apn: TEXT
        built_form_key: TEXT
    brewgis.assessor.parcel_bft_tier0_landuse:
      rows: []
      columns:
        apn: TEXT
        built_form_key: TEXT
    brewgis.assessor.parcel_bft_lightgbm:
      rows:
        - apn: "TEST_LGBM_PRIORITY_001"
          built_form_key: "bt__high_density_attached_residential"
          probability: 0.88
      columns:
        apn: TEXT
        built_form_key: TEXT
        probability: DOUBLE
    brewgis.assessor.parcel_bft_tier3b_agricultural:
      rows:
        - apn: "TEST_LGBM_PRIORITY_001"
          built_form_key: "bt__agriculture"
      columns:
        apn: TEXT
        built_form_key: TEXT
    brewgis.assessor.parcel_bft_tier4_catchall:
      rows: []
      columns:
        apn: TEXT
        built_form_key: TEXT
  outputs:
    query:
      partial: true
      rows:
        - apn: "TEST_LGBM_PRIORITY_001"
          built_form_key: "bt__high_density_attached_residential"
          built_form_key_source: "lightgbm"
          du_subtype: "mf5p"
          is_residential: 1

