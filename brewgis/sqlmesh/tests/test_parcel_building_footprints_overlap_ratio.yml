test_building_fully_inside_parcel_gets_full_sqft:
  model: brewgis.assessor.parcel_building_footprints
  gateway: postgis
  inputs:
    brewgis.assessor.sacog_assessor_parcels:
      rows:
        - apn: "PARCEL_FULL"
          lot_size_acres: 2.3
          geometry: "POLYGON((0 0, 200 0, 200 200, 0 200, 0 0))"
          local_geometry: "POLYGON((0 0, 200 0, 200 200, 0 200, 0 0))"
          land_development_category: "urban"
      columns:
        geometry: GEOMETRY
        local_geometry: GEOMETRY
    brewgis.staging.buildings_combined_pg:
      rows:
        - geometry: "POLYGON((50 50, 150 50, 150 150, 50 150, 50 50))"
          footprint_sqft: 5000.0
          levels: 3
          class_category: "residential"
          bf_source: "overture"
          confidence: 0.9
          height: 30.0
          source: "overture"
          source_id: "bldg_001"
          local_geometry: "POLYGON((50 50, 150 50, 150 150, 50 150, 50 50))"
      columns:
        geometry: GEOMETRY
        local_geometry: GEOMETRY
  outputs:
    query:
      partial: true
      rows:
        - apn: "PARCEL_FULL"
          total_footprint_sqft: 15000.0
          residential_building_sqft: 5000.0
          building_count: 1
          max_levels: 3
          max_height: 30.0

