# External model declarations for SACOG comparison tables.
#
# These tables are created by the compare_sacog_basemap management command
# and the SACOG v1 SQL dump restore. They are referenced by SQLMesh models
# in the comparison/ directory.

- name: public.sacog_comparison_parcels
  description: "SACOG v1 reference parcels, loaded from sac_cnty_region_existing_land_use_parcels by compare_sacog_basemap. Used by sacog_parcel_shim and parcels_wm."
  columns:
    parcel_id: text
    id: text
    geometry: geometry
    du: double precision
    emp: double precision
    land_use: text
    assessor: text
    acres: double precision
    ret: double precision
    off: double precision
    pub: double precision
    ind: double precision
    other: double precision
    jurisdiction: text
    gp: text
    gluc: text
    census_blockgroup: text
    census_block: text
    notes: text

- name: public.sac_cnty_region_base_canvas
  description: "SACOG v1 reference base canvas (aggregate totals), restored from SQL dump. Used by sacog_reference_totals."
  columns:
