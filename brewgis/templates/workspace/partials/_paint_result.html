<div id="paint-result-message">
  {% if status == "ok" %}
    <div class="alert alert-success alert-dismissible fade show py-1 small" role="alert">
      {% if painted_count %}
        Painted <strong>{{ painted_count }}</strong> field(s) on <strong>{{ painted_features|length }}</strong> feature(s).
      {% elif cleared_count %}
        Cleared <strong>{{ cleared_count }}</strong> painted field(s).
      {% endif %}
      <button type="button" class="btn-close py-1" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
  {% elif status == "error" %}
    <div class="alert alert-danger alert-dismissible fade show py-1 small" role="alert">
      {{ message }}
      <button type="button" class="btn-close py-1" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
  {% endif %}
</div>
