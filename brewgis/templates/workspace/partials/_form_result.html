<div id="form-result">
  {% if success %}
    <div class="alert alert-success" role="alert">
      {{ message }}
    </div>
  {% endif %}
  {% if errors %}
    <div class="alert alert-danger" role="alert">
      <ul class="mb-0">
        {% for error in errors %}
          <li>{{ error }}</li>
        {% endfor %}
      </ul>
    </div>
  {% endif %}
</div>
