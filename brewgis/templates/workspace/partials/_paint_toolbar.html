<div id="paint-toolbar" class="p-2 bg-light border-bottom" style="display: none;">
  <div class="row g-2 align-items-center">
    <!-- Feature count -->
    <div class="col-auto">
      <small class="text-muted" id="paint-feature-count">0 parcels selected</small>
    </div>

    <!-- Paint mode tabs -->
    <div class="col-auto">
      <div class="btn-group btn-group-sm" role="group">
        <input type="radio" class="btn-check" name="paint-mode" id="paint-mode-direct" value="direct" checked>
        <label class="btn btn-outline-secondary" for="paint-mode-direct">Direct Paint</label>
        <input type="radio" class="btn-check" name="paint-mode" id="paint-mode-bf" value="built_form">
        <label class="btn btn-outline-secondary" for="paint-mode-bf">Built Form</label>
      </div>
    </div>

    <!-- Direct Paint Controls -->
    <div class="col-auto" id="paint-direct-controls">
      <select class="form-select form-select-sm" id="paint-column" name="column" aria-label="Column">
        <option value="">Select column...</option>
        {% for column in paintable_columns %}
          <option value="{{ column.name }}">{{ column.label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-auto" id="paint-direct-controls">
      <input type="number" class="form-control form-control-sm" id="paint-value" name="value" placeholder="Value" step="any">
    </div>

    <!-- Built Form Controls (hidden by default, shown via JS) -->
    <div class="col-auto" id="paint-bf-controls" style="display: none;">
      <select class="form-select form-select-sm" id="paint-bf-type" name="bf_type" aria-label="Built Form Type">
        <option value="building">Building Type</option>
        <option value="place">Place Type</option>
      </select>
    </div>
    <div class="col-auto" id="paint-bf-controls" style="display: none;">
      <select class="form-select form-select-sm" id="paint-bf-id" name="bf_id" aria-label="Built Form">
        <option value="">Select...</option>
        {% if built_forms %}
          {% if built_forms.building_types %}
            <optgroup label="Building Types" id="bf-optgroup-building" data-type="building">
              {% for bf in built_forms.building_types %}
                <option value="{{ bf.id }}" data-type="building">{{ bf.name }}</option>
              {% endfor %}
            </optgroup>
          {% endif %}
          {% if built_forms.place_types %}
            <optgroup label="Place Types" id="bf-optgroup-place" data-type="place" style="display: none;">
              {% for bf in built_forms.place_types %}
                <option value="{{ bf.id }}" data-type="place">{{ bf.name }}</option>
              {% endfor %}
            </optgroup>
          {% endif %}
        {% endif %}
      </select>
    </div>

    <!-- Hidden fields for selected feature IDs -->
    <input type="hidden" id="paint-feature-ids" name="features" value="">

    <!-- Buttons -->
    <div class="col-auto ms-auto">
      <button type="button" class="btn btn-sm btn-primary" id="paint-apply-btn" disabled
              hx-post="{{ paint_url }}"
              hx-target="#paint-result"
              hx-swap="innerHTML"
              hx-include="#paint-toolbar select, #paint-toolbar input"
              hx-trigger="click"
              hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
        Apply
      </button>
      <button type="button" class="btn btn-sm btn-outline-danger" id="paint-clear-btn" disabled
              hx-post="{{ clear_url }}"
              hx-target="#paint-result"
              hx-swap="innerHTML"
              hx-include="#paint-feature-ids"
              hx-trigger="click"
              hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
        Clear
      </button>
    </div>
  </div>

  <!-- Result feedback area -->
  <div id="paint-result" class="mt-1"></div>
</div>
