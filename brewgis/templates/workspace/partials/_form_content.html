{% load crispy_forms_tags %}

<div class="container mt-4" id="form-content">
  <div class="row">
    <div class="col-lg-8 mx-auto">
      <div class="card">
        <div class="card-header">
          <h5 class="card-title mb-0">
            {% if view.object.pk %}
              {{ view.object }}
            {% else %}
              New {{ view.form_class.Meta.model._meta.verbose_name|title }}
            {% endif %}
          </h5>
        </div>
        <div class="card-body">
          <form method="post"
                enctype="multipart/form-data"
                hx-post="."
                hx-target="#form-content"
                hx-swap="outerHTML"
                hx-trigger="submit">
            {% csrf_token %}
            {% crispy form %}
            <div class="mt-3">
              <button type="submit" class="btn btn-primary">Save</button>
              <a href="{% url 'workspace:home' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
