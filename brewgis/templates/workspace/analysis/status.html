{% extends "base.html" %}
{% load workspace_tags %}

{% block title %}
  Analysis Run #{{ run.pk }} — Brew GIS
{% endblock title %}

{% block content %}
<div class="container mt-2">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h5 class="card-title mb-0">Analysis Run #{{ run.pk }}</h5>
          <div>
            <a href="{% url 'workspace:analysis_list' %}" class="btn btn-sm btn-outline-secondary">All Runs</a>
            <a href="{% url 'workspace:home' %}" class="btn btn-sm btn-outline-secondary">Home</a>
          </div>
        </div>
        <div class="card-body">
          {% include "workspace/analysis/partials/_status.html" %}
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
