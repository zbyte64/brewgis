{% load i18n %}

<div id="filter-editor-{{ layer.pk }}">
  <div class="card card-body p-2 mb-2 bg-light" style="font-size: 0.7rem;">
    <form hx-post="{% if filter %}{% url 'workspace:layer_filter_edit' filter.pk %}{% else %}{% url 'workspace:layer_filter_create' layer.pk %}{% endif %}"
          hx-target="#filter-list-{{ layer.pk }}"
          hx-swap="outerHTML"
          class="d-flex flex-column gap-2">
      {% csrf_token %}
      {% if error %}<div class="alert alert-danger py-1 px-2 mb-0" style="font-size: 0.7rem;">{{ error }}</div>{% endif %}
      <div>
        <label class="form-label mb-0" style="font-size: 0.7rem;">{% translate "Filter Name" %}</label>
        <input type="text"
               name="name"
               class="form-control form-control-sm"
               value="{{ filter.name|default:'' }}"
               placeholder="{% translate 'e.g. High Density Residential' %}"
               required
               style="font-size: 0.7rem" />
      </div>
      <div>
        <label class="form-label mb-0" style="font-size: 0.7rem;">{% translate "Filter Expression (JSON)" %}</label>
        <small class="text-muted d-block mb-1" style="font-size: 0.65rem;">
          {% translate "Build an expression tree with AND/OR groups:" %}
        </small>
        <textarea name="filter_json"
                  class="form-control form-control-sm font-monospace"
                  rows="8"
                  style="font-size: 0.65rem"
                  placeholder='{ "type": "group", "operator": "AND", "children": [ { "type": "column", "field": "existing_du", "operator": "gt", "value": "0", "value_type": "number" }, { "type": "column", "field": "land_use", "operator": "eq", "value": "residential", "value_type": "string" } ] }'>{% if filter %}{{ filter.filter_json|pprint }}{% endif %}</textarea>
      </div>
      <div class="d-flex gap-1">
        <button type="submit"
                class="btn btn-sm btn-primary py-0"
                style="font-size: 0.7rem">
          {% if filter %}
            {% translate "Save" %}
          {% else %}
            {% translate "Create" %}
          {% endif %}
        </button>
        <button type="button"
                class="btn btn-sm btn-outline-secondary py-0"
                style="font-size: 0.7rem"
                hx-get="{% url 'workspace:layer_filter_list' layer.pk %}"
                hx-target="#filter-list-{{ layer.pk }}"
                hx-swap="outerHTML">{% translate "Cancel" %}</button>
      </div>
    </form>
    <hr class="my-1" />
    <div style="font-size: 0.65rem;">
      <strong>{% translate "Filter Operators:" %}</strong>
      <ul class="mb-0 ps-3 mt-1">
        <li>
          <code>eq</code> = equal, <code>neq</code> ≠ not equal
        </li>
        <li>
          <code>gt</code> &gt;, <code>gte</code> ≥, <code>lt</code> &lt;, <code>lte</code> ≤
        </li>
        <li>
          <code>contains</code> = text contains
        </li>
        <li>
          <code>is_null</code> / <code>is_not_null</code>
        </li>
      </ul>
    </div>
  </div>
</div>
