<div id="employment-preview">
  {% if summary %}
    {% if summary.error %}
      <div class="alert alert-danger mt-2 small">{{ summary.error }}</div>
    {% elif summary.row_count > 0 %}
      <div class="alert alert-info mt-2 small py-2">
        <strong>Available Data:</strong>
        {{ summary.row_count }} blocks found.
        Aggregates: {{ summary.aggregate_columns|join:", " }}.
      </div>
    {% else %}
      <div class="alert alert-warning mt-2 small py-2">No data found for this geography.</div>
    {% endif %}
  {% endif %}
</div>
