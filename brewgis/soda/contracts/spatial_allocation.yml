# Soda Core contract: spatial_allocation validation
dataset: __DATASET__
columns: []
checks:
  - row_count:
      check: '> 0'
      name: Table has rows
  - missing:
      column: target_geoid
      check: '= 0'
      name: target_geoid has no missing values
  - missing:
      column: source_geoid
      check: '= 0'
      name: source_geoid has no missing values
  - missing:
      column: allocated_population
      check: '= 0'
      name: allocated_population has no missing values
  - missing:
      column: allocated_employment
      check: '= 0'
      name: allocated_employment has no missing values
  - missing:
      column: allocation_weight
      check: '= 0'
      name: allocation_weight has no missing values
  - aggregate:
      column: allocated_population
      function: min
      check: '>= 0'
      name: allocated_population >= 0
  - aggregate:
      column: allocated_employment
      function: min
      check: '>= 0'
      name: allocated_employment >= 0
  - aggregate:
      column: allocation_weight
      function: min
      check: '>= 0'
      name: allocation_weight >= 0
  - aggregate:
      column: allocation_weight
      function: max
      check: '<= 1'
      name: allocation_weight <= 1
