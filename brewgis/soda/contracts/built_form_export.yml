# Soda Core contract: built_form_export validation
dataset: __DATASET__
columns: []
checks:
  - row_count:
      check: '> 0'
      name: Table has rows
  - missing:
      column: parcel_id
      check: '= 0'
      name: parcel_id has no missing values
  - missing:
      column: building_type_id
      check: '= 0'
      name: building_type_id has no missing values
  - missing:
      column: place_type_id
      check: '= 0'
      name: place_type_id has no missing values
  - aggregate:
      column: du_per_acre
      function: min
      check: '>= 0'
      name: du_per_acre >= 0
  - aggregate:
      column: pop_per_acre
      function: min
      check: '>= 0'
      name: pop_per_acre >= 0
  - aggregate:
      column: building_sqft
      function: min
      check: '>= 0'
      name: building_sqft >= 0
  - aggregate:
      column: FAR
      function: min
      check: '>= 0'
      name: FAR >= 0
  - duplicate:
      column: parcel_id
      check: '= 0'
      name: parcel_id is unique
