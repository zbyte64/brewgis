# Soda Core contract: built_form_export validation
dataset: __DATASET__
columns:
  - name: parcel_id
    checks:
      - missing:
          name: parcel_id has no missing values
      - duplicate:
          name: parcel_id is unique
  - name: building_type_id
    checks:
      - missing:
          name: building_type_id has no missing values
  - name: place_type_id
    checks:
      - missing:
          name: place_type_id has no missing values
  - name: du_per_acre
    checks:
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: du_per_acre >= 0
  - name: pop_per_acre
    checks:
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: pop_per_acre >= 0
  - name: building_sqft
    checks:
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: building_sqft >= 0
  - name: FAR
    checks:
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: FAR >= 0
checks:
  - row_count:
      check: '> 0'
      name: Table has rows
