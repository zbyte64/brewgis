# Soda Core contract: built_form_export validation
# Validates the public.built_forms table created by export_building_types().
# Columns match the BUILT_FORM_COLUMNS mapping in data_export.py.
dataset: __DATASET__
columns:
  - name: id
    checks:
      - missing:
          name: id has no missing values
      - duplicate:
          name: id is unique
  - name: key
    checks:
      - missing:
          name: key has no missing values
  - name: du_per_acre
    checks:
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: du_per_acre >= 0
  - name: emp_per_acre
    checks:
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: emp_per_acre >= 0
  - name: far
    checks:
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: far >= 0
checks:
  - row_count:
      check: '> 0'
      name: Table has rows
