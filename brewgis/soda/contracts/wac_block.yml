# Soda Core contract: wac_block staging table validation
dataset: __DATASET__
columns:
  - name: geoid
    checks:
      - missing:
          name: geoid has no missing values
  - name: geometry
    checks:
      - missing:
          name: geometry has no missing values
      - metric:
          expression: MIN(public.ST_SRID(geometry))
          threshold:
            must_be: 4326
          name: geometry SRID is 4326

  - name: emp
    checks:
      - missing:
          name: emp has reasonable values
      # TODO [NOT_EVALUATED] blocks this somehow
      #- aggregate:
      #    function: sum
      #    threshold:
      #      must_be_greater_than_or_equal: 100000
      #      must_be_less_than_or_equal: 5000000
      #    name: sum(emp) within reasonable range for US county
      #    severity: warn
  - name: emp_ret
    checks:
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: emp_ret >= 0
checks:
  - row_count:
      check: '> 0'
      name: Table has rows
