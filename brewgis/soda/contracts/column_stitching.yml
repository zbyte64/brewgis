# Soda Core contract: column_stitching / imputation validation
dataset: __DATASET__
columns:
  - name: parcel_id
    checks:
      - missing:
          name: parcel_id has no missing values
      - duplicate:
          name: parcel_id is unique
  - name: imputed_population
    checks:
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: imputed_population >= 0
  - name: imputed_households
    checks:
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: imputed_households >= 0
  - name: imputed_employment
    checks:
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: imputed_employment >= 0
  - name: imputed_du
    checks:
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: imputed_du >= 0
checks:
  - row_count:
      check: '> 0'
      name: Table has rows
