# Soda Core contract: column_stitching / imputation validation
dataset: __DATASET__
columns: []
checks:
  - row_count:
      check: '> 0'
      name: Table has rows
  - missing:
      column: parcel_id
      check: '= 0'
      name: parcel_id has no missing values
  - aggregate:
      column: imputed_population
      function: min
      check: '>= 0'
      name: imputed_population >= 0
  - aggregate:
      column: imputed_households
      function: min
      check: '>= 0'
      name: imputed_households >= 0
  - aggregate:
      column: imputed_employment
      function: min
      check: '>= 0'
      name: imputed_employment >= 0
  - aggregate:
      column: imputed_du
      function: min
      check: '>= 0'
      name: imputed_du >= 0
  - duplicate:
      column: parcel_id
      check: '= 0'
      name: parcel_id is unique
