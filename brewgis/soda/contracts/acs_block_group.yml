# Soda Core contract: acs_block_group staging table validation
dataset: __DATASET__
columns:
  - name: geoid
    checks:
      - missing:
          name: geoid has no missing values
  - name: geometry
    checks:
      - missing:
          name: geometry has no missing values
      - metric:
          expression: MIN(public.ST_SRID(geometry))
          threshold:
            must_be: 4326
          name: geometry SRID is 4326

  - name: pop
    checks:
      - missing:
          name: pop has no missing values
      - aggregate:
          function: sum
          threshold:
            must_be_greater_than_or_equal: 1
          name: sum(pop) >= 1
  - name: hh
    checks:
      - missing:
          name: hh has no missing values
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: hh >= 0
  - name: du
    checks:
      - missing:
          name: du has no missing values
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: du >= 0
  - name: median_income
    checks:
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: median_income >= 0
checks:
  - row_count:
      check: '> 0'
      name: Table has rows
  - metric:
      expression: SUM(pop)
      threshold:
        must_be_greater_than_or_equal: 1000
      name: sum(pop) >= 1000 for county-scale
