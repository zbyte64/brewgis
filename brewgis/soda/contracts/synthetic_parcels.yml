# Soda Core contract: synthetic_parcels validation
dataset: __DATASET__
columns: []
checks:
  - row_count:
      check: '> 0'
      name: Table has rows
  - missing:
      column: parcel_id
      check: '= 0'
      name: parcel_id has no missing values
  - missing:
      column: geometry
      check: '= 0'
      name: geometry has no missing values
  - missing:
      column: population
      check: '= 0'
      name: population has no missing values
  - missing:
      column: du
      check: '= 0'
      name: du has no missing values
  - missing:
      column: area_parcel
      check: '= 0'
      name: area_parcel has no missing values
  - aggregate:
      column: population
      function: min
      check: '>= 0'
      name: population >= 0
  - aggregate:
      column: du
      function: min
      check: '>= 0'
      name: du >= 0
  - aggregate:
      column: area_parcel
      function: min
      check: '>= 0'
      name: area_parcel >= 0
  - aggregate:
      column: households
      function: min
      check: '>= 0'
      name: households >= 0
  - aggregate:
      column: housing_units
      function: min
      check: '>= 0'
      name: housing_units >= 0
  - aggregate:
      column: res_sqft
      function: min
      check: '>= 0'
      name: res_sqft >= 0
  - aggregate:
      column: com_sqft
      function: min
      check: '>= 0'
      name: com_sqft >= 0
  - aggregate:
      column: ind_sqft
      function: min
      check: '>= 0'
      name: ind_sqft >= 0
  - aggregate:
      column: median_income
      function: min
      check: '>= 0'
      name: median_income >= 0
  - aggregate:
      column: rent_burden_pct
      function: min
      check: '>= 0'
      name: rent_burden_pct >= 0
  - aggregate:
      column: rent_burden_pct
      function: max
      check: '<= 100'
      name: rent_burden_pct <= 100
  - aggregate:
      column: pct_minority
      function: min
      check: '>= 0'
      name: pct_minority >= 0
  - aggregate:
      column: pct_minority
      function: max
      check: '<= 100'
      name: pct_minority <= 100
  - aggregate:
      column: pct_college_educated
      function: min
      check: '>= 0'
      name: pct_college_educated >= 0
  - aggregate:
      column: pct_college_educated
      function: max
      check: '<= 100'
      name: pct_college_educated <= 100
  - aggregate:
      column: cost_burden_pct
      function: min
      check: '>= 0'
      name: cost_burden_pct >= 0
  - aggregate:
      column: cost_burden_pct
      function: max
      check: '<= 100'
      name: cost_burden_pct <= 100
  - duplicate:
      column: parcel_id
      check: '= 0'
      name: parcel_id is unique
