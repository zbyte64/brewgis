# Soda Core contract: synthetic_parcels validation
checks for __TABLE__:
  - row_count > 0:
      name: Table has rows
  - missing_count(parcel_id) = 0:
      name: parcel_id has no missing values
  - missing_count(geometry) = 0:
      name: geometry has no missing values
  - missing_count(population) = 0:
      name: population has no missing values
  - missing_count(du) = 0:
      name: du has no missing values
  - missing_count(area_parcel) = 0:
      name: area_parcel has no missing values
  - min(population) >= 0:
      name: population >= 0
  - min(du) >= 0:
      name: du >= 0
  - min(area_parcel) >= 0:
      name: area_parcel >= 0
  - min(households) >= 0:
      name: households >= 0
  - min(housing_units) >= 0:
      name: housing_units >= 0
  - min(res_sqft) >= 0:
      name: res_sqft >= 0
  - min(com_sqft) >= 0:
      name: com_sqft >= 0
  - min(ind_sqft) >= 0:
      name: ind_sqft >= 0
  - min(median_income) >= 0:
      name: median_income >= 0
  - min(rent_burden_pct) >= 0:
      name: rent_burden_pct >= 0
  - max(rent_burden_pct) <= 100:
      name: rent_burden_pct <= 100
  - min(pct_minority) >= 0:
      name: pct_minority >= 0
  - max(pct_minority) <= 100:
      name: pct_minority <= 100
  - min(pct_college_educated) >= 0:
      name: pct_college_educated >= 0
  - max(pct_college_educated) <= 100:
      name: pct_college_educated <= 100
  - min(cost_burden_pct) >= 0:
      name: cost_burden_pct >= 0
  - max(cost_burden_pct) <= 100:
      name: cost_burden_pct <= 100
  - duplicate_count(parcel_id) = 0:
      name: parcel_id is unique
