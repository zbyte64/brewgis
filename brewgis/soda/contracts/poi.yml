# Soda Core contract: POI staging validation
checks for __TABLE__:
  - row_count > 0:
      name: Table has rows
  - missing_count(osm_id) = 0:
      name: osm_id has no missing values
  - missing_count(name) = 0:
      name: name has no missing values
  - missing_count(category) = 0:
      name: category has no missing values
  - missing_count(geometry) = 0:
      name: geometry has no missing values
  - min(lat) >= -90:
      name: lat >= -90
  - max(lat) <= 90:
      name: lat <= 90
  - min(lon) >= -180:
      name: lon >= -180
  - max(lon) <= 180:
      name: lon <= 180
  - duplicate_count(osm_id) = 0:
      name: osm_id is unique
