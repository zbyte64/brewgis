# Soda Core contract: POI staging validation
dataset: __DATASET__
columns:
  - name: osm_id
    checks:
      - missing:
          name: osm_id has no missing values
      - duplicate:
          name: osm_id is unique
  - name: name
    checks:
      - missing:
          name: name has no missing values
  - name: category
    checks:
      - missing:
          name: category has no missing values
  - name: geometry
    checks:
      - missing:
          name: geometry has no missing values
      - metric:
          expression: MIN(public.ST_SRID(geometry))
          threshold:
            must_be: 4326
          name: geometry SRID is 4326

  - name: lat
    checks:
      - aggregate:
          function: min
          qualifier: min
          threshold:
            must_be_greater_than_or_equal: -90
          name: lat >= -90
      - aggregate:
          function: max
          qualifier: max
          threshold:
            must_be_less_than_or_equal: 90
          name: lat <= 90
  - name: lon
    checks:
      - aggregate:
          function: min
          qualifier: min
          threshold:
            must_be_greater_than_or_equal: -180
          name: lon >= -180
      - aggregate:
          function: max
          qualifier: max
          threshold:
            must_be_less_than_or_equal: 180
          name: lon <= 180
checks:
  - row_count:
      check: '> 0'
      name: Table has rows
