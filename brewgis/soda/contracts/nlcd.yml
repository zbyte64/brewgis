# Soda Core contract: NLCD staging validation
checks for __TABLE__:
  - row_count > 0:
      name: Table has rows
  - missing_count(geoid) = 0:
      name: geoid has no missing values
  - missing_count(impervious_pct) = 0:
      name: impervious_pct has no missing values
  - missing_count(canopy_pct) = 0:
      name: canopy_pct has no missing values
  - missing_count(land_cover_class) = 0:
      name: land_cover_class has no missing values
  - missing_count(geometry) = 0:
      name: geometry has no missing values
  - min(impervious_pct) >= 0:
      name: impervious_pct >= 0
  - max(impervious_pct) <= 100:
      name: impervious_pct <= 100
  - min(canopy_pct) >= 0:
      name: canopy_pct >= 0
  - max(canopy_pct) <= 100:
      name: canopy_pct <= 100
  - duplicate_count(geoid) = 0:
      name: geoid is unique
