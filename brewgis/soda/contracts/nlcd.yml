# Soda Core contract: NLCD staging validation
dataset: __DATASET__
columns:
  - name: geoid
    checks:
      - missing:
          name: geoid has no missing values
      - duplicate:
          name: geoid is unique
  - name: impervious_pct
    checks:
      - missing:
          name: impervious_pct has no missing values
      - aggregate:
          function: min
          qualifier: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: impervious_pct >= 0
      - aggregate:
          function: max
          qualifier: max
          threshold:
            must_be_less_than_or_equal: 100
          name: impervious_pct <= 100
  - name: canopy_pct
    checks:
      - missing:
          name: canopy_pct has no missing values
      - aggregate:
          function: min
          qualifier: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: canopy_pct >= 0
      - aggregate:
          function: max
          qualifier: max
          threshold:
            must_be_less_than_or_equal: 100
          name: canopy_pct <= 100
  - name: land_cover_class
    checks:
      - missing:
          name: land_cover_class has no missing values
  - name: geometry
    checks:
      - missing:
          name: geometry has no missing values
      - metric:
          expression: MIN(public.ST_SRID(geometry))
          threshold:
            must_be: 4326
          name: geometry SRID is 4326

checks:
  - row_count:
      check: '> 0'
      name: Table has rows
