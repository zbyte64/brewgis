# Soda Core contract: census_acs staging validation
dataset: __DATASET__
columns:
  - name: geoid
    checks:
      - missing:
          name: geoid has no missing values
      - duplicate:
          name: geoid is unique
  - name: population
    checks:
      - missing:
          name: population has no missing values
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: population >= 0
  - name: households
    checks:
      - missing:
          name: households has no missing values
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: households >= 0
  - name: housing_units
    checks:
      - missing:
          name: housing_units has no missing values
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: housing_units >= 0
  - name: median_income
    checks:
      - missing:
          name: median_income has no missing values
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: median_income >= 0
  - name: geometry
    checks:
      - missing:
          name: geometry has no missing values
  - name: poverty_rate
    checks:
      - aggregate:
          function: min
          qualifier: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: poverty_rate >= 0
      - aggregate:
          function: max
          qualifier: max
          threshold:
            must_be_less_than_or_equal: 1
          name: poverty_rate <= 1
  - name: vacancy_rate
    checks:
      - aggregate:
          function: min
          qualifier: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: vacancy_rate >= 0
      - aggregate:
          function: max
          qualifier: max
          threshold:
            must_be_less_than_or_equal: 1
          name: vacancy_rate <= 1
  - name: owner_occupied_pct
    checks:
      - aggregate:
          function: min
          qualifier: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: owner_occupied_pct >= 0
      - aggregate:
          function: max
          qualifier: max
          threshold:
            must_be_less_than_or_equal: 1
          name: owner_occupied_pct <= 1
checks:
  - row_count:
      check: '> 0'
      name: Table has rows
