# Soda Core contract: census_acs staging validation
dataset: __DATASET__
columns: []
checks:
  - row_count:
      check: '> 0'
      name: Table has rows
  - missing:
      column: geoid
      check: '= 0'
      name: geoid has no missing values
  - missing:
      column: population
      check: '= 0'
      name: population has no missing values
  - missing:
      column: households
      check: '= 0'
      name: households has no missing values
  - missing:
      column: housing_units
      check: '= 0'
      name: housing_units has no missing values
  - missing:
      column: median_income
      check: '= 0'
      name: median_income has no missing values
  - missing:
      column: geometry
      check: '= 0'
      name: geometry has no missing values
  - aggregate:
      column: population
      function: min
      check: '>= 0'
      name: population >= 0
  - aggregate:
      column: households
      function: min
      check: '>= 0'
      name: households >= 0
  - aggregate:
      column: housing_units
      function: min
      check: '>= 0'
      name: housing_units >= 0
  - aggregate:
      column: median_income
      function: min
      check: '>= 0'
      name: median_income >= 0
  - aggregate:
      column: poverty_rate
      function: min
      check: '>= 0'
      name: poverty_rate >= 0
  - aggregate:
      column: poverty_rate
      function: max
      check: '<= 1'
      name: poverty_rate <= 1
  - aggregate:
      column: vacancy_rate
      function: min
      check: '>= 0'
      name: vacancy_rate >= 0
  - aggregate:
      column: vacancy_rate
      function: max
      check: '<= 1'
      name: vacancy_rate <= 1
  - aggregate:
      column: owner_occupied_pct
      function: min
      check: '>= 0'
      name: owner_occupied_pct >= 0
  - aggregate:
      column: owner_occupied_pct
      function: max
      check: '<= 1'
      name: owner_occupied_pct <= 1
  - duplicate:
      column: geoid
      check: '= 0'
      name: geoid is unique
