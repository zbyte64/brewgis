# Soda Core contract: census_acs staging validation
# Validates acs_raw table as loaded by dlt from Census API.
# dlt normalizes Census variable codes: B01001_001E → b01001_001_e
dataset: __DATASET__
columns:
  - name: year
    checks:
      - missing:
          name: year has no missing values
  - name: state
    checks:
      - missing:
          name: state has no missing values
  - name: county
    checks:
      - missing:
          name: county has no missing values
  - name: tract
    checks:
      - missing:
          name: tract has no missing values
  - name: block_group
    checks:
      - missing:
          name: block_group has no missing values
  - name: b01001_001_e
    checks:
      - missing:
          name: total population (B01001_001E) has no missing values
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: total population >= 0
  - name: b25003_001_e
    checks:
      - missing:
          name: total households (B25003_001E) has no missing values
checks:
  - row_count:
      check: '> 0'
      name: Table has rows
