# Soda Core contract: census_acs staging validation
checks for __TABLE__:
  - row_count > 0:
      name: Table has rows
  - missing_count(geoid) = 0:
      name: geoid has no missing values
  - missing_count(population) = 0:
      name: population has no missing values
  - missing_count(households) = 0:
      name: households has no missing values
  - missing_count(housing_units) = 0:
      name: housing_units has no missing values
  - missing_count(median_income) = 0:
      name: median_income has no missing values
  - missing_count(geometry) = 0:
      name: geometry has no missing values
  - min(population) >= 0:
      name: population >= 0
  - min(households) >= 0:
      name: households >= 0
  - min(housing_units) >= 0:
      name: housing_units >= 0
  - min(median_income) >= 0:
      name: median_income >= 0
  - min(poverty_rate) >= 0:
      name: poverty_rate >= 0
  - max(poverty_rate) <= 1:
      name: poverty_rate <= 1
  - min(vacancy_rate) >= 0:
      name: vacancy_rate >= 0
  - max(vacancy_rate) <= 1:
      name: vacancy_rate <= 1
  - min(owner_occupied_pct) >= 0:
      name: owner_occupied_pct >= 0
  - max(owner_occupied_pct) <= 1:
      name: owner_occupied_pct <= 1
  - duplicate_count(geoid) = 0:
      name: geoid is unique
