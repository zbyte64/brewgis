# Soda Core contract: base_canvas validation
dataset: __DATASET__
columns: []
checks:
  - row_count:
      check: '> 0'
      name: Table has rows
  - missing:
      column: parcel_id
      check: '= 0'
      name: parcel_id has no missing values
  - missing:
      column: geometry
      check: '= 0'
      name: geometry has no missing values
  - missing:
      column: population
      check: '= 0'
      name: population has no missing values
  - missing:
      column: du
      check: '= 0'
      name: du has no missing values
  - missing:
      column: area_parcel
      check: '= 0'
      name: area_parcel has no missing values
  - aggregate:
      column: population
      function: min
      check: '>= 0'
      name: population >= 0
  - aggregate:
      column: households
      function: min
      check: '>= 0'
      name: households >= 0
  - aggregate:
      column: housing_units
      function: min
      check: '>= 0'
      name: housing_units >= 0
  - aggregate:
      column: du
      function: min
      check: '>= 0'
      name: du >= 0
  - aggregate:
      column: res_sqft
      function: min
      check: '>= 0'
      name: res_sqft >= 0
  - aggregate:
      column: com_sqft
