# Soda Core contract: base_canvas validation
dataset: __DATASET__
columns:
  - name: parcel_id
    checks:
      - missing:
          name: parcel_id has no missing values
  - name: geometry
    checks:
      - missing:
          name: geometry has no missing values
  - name: population
    checks:
      - missing:
          name: population has no missing values
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: population >= 0
  - name: du
    checks:
      - missing:
          name: du has no missing values
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: du >= 0
  - name: area_parcel
    checks:
      - missing:
          name: area_parcel has no missing values
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: area_parcel >= 0
  - name: households
    checks:
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: households >= 0
  - name: housing_units
    checks:
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: housing_units >= 0
  - name: res_sqft
