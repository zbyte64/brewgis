# Soda Core contract: base_canvas validation
dataset: __DATASET__
columns:
  - name: geography_id
    checks:
      - missing:
          name: geography_id has no missing values
  - name: geometry
    checks:
      - missing:
          name: geometry has no missing values
  - name: pop
    checks:
      - missing:
          name: population has no missing values
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: pop >= 0
  - name: du
    checks:
      - missing:
          name: du has no missing values
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: du >= 0
  - name: area_parcel
    checks:
      - missing:
          name: area_parcel has no missing values
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: area_parcel >= 0
  - name: hh
    checks:
      - aggregate:
          function: min
          qualifier: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: hh >= 0
  - name: residential_irrigated_area
    checks:
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: residential_irrigated_area >= 0
  - name: commercial_irrigated_area
    checks:
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: commercial_irrigated_area >= 0
  - name: median_income
    checks:
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: median_income >= 0
  - name: rent_burden_pct
    checks:
      - aggregate:
          function: min
          qualifier: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: rent_burden_pct >= 0
      - aggregate:
          function: max
          qualifier: max
          threshold:
            must_be_less_than_or_equal: 100
          name: rent_burden_pct <= 100
  - name: pct_minority
    checks:
      - aggregate:
          function: min
          qualifier: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: pct_minority >= 0
      - aggregate:
          function: max
          qualifier: max
          threshold:
            must_be_less_than_or_equal: 100
          name: pct_minority <= 100
  - name: pct_college_educated
    checks:
      - aggregate:
          function: min
          qualifier: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: pct_college_educated >= 0
      - aggregate:
          function: max
          qualifier: max
          threshold:
            must_be_less_than_or_equal: 100
          name: pct_college_educated <= 100
  - name: cost_burden_pct
    checks:
      - aggregate:
          function: min
          qualifier: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: cost_burden_pct >= 0
      - aggregate:
          function: max
          qualifier: max
          threshold:
            must_be_less_than_or_equal: 100
          name: cost_burden_pct <= 100
  - name: intersection_density
    checks:
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: intersection_density >= 0
checks:
  - row_count:
      check: '> 0'
      name: Table has rows
