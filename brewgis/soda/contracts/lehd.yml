# Soda Core contract: LEHD LODES staging validation
# Validates lodes_raw table as loaded by dlt from LEHD LODES WAC CSV.
# dlt normalizes CSV column names to lowercase.
# The raw staging table has w_geocode (not geoid) and no geometry column.
dataset: __DATASET__
columns:
  - name: w_geocode
    checks:
      - missing:
          name: w_geocode has no missing values
      - duplicate:
          name: w_geocode is unique
  - name: c000
    checks:
      - missing:
          name: c000 has no missing values
      - aggregate:
          function: min
          threshold:
            must_be_greater_than_or_equal: 0
          name: c000 >= 0
  - name: year
    checks:
      - missing:
          name: year has no missing values
checks:
  - row_count:
      check: '> 0'
      name: Table has rows
