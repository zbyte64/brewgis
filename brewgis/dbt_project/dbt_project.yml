# Brew GIS DBT Project
# Analysis modules for urban planning and scenario modeling.

name: "brewgis"
version: "1.0.0"
config-version: 2

profile: "brewgis"

model-paths: ["models"]
macro-paths: ["macros"]
analysis-paths: []
test-paths: []
seed-paths: []
snapshot-paths: []

clean-targets:
  - "target"
  - "dbt_packages"

models:
  brewgis:
    +materialized: view
    +schema: "{{ var('target_schema', 'public') }}"
vars:
  # Default values for SQLFluff / dbt compilation.
  # Runtime values are provided by dbt_runner.py when executing models.
  parcel_table: parcels
  constraint_table: constraints
  built_form_table: built_forms
  source_schema: public
  target_schema: public
  scenario_id: lint
  base_canvas_table: base_canvas
  constraints: []

  # Land Consumption — parking and impervious defaults
  parking_per_unit: 0.5
  parking_per_employee: 0.2
  ground_coverage_factor: 0.6
  parking_space_sqft: 300
  row_fraction: 0.15

  # Fiscal Impact — assessed values, tax rates, service costs
  res_assessed_value_per_du: 350000
  nonres_assessed_value_per_sqft: 150
  property_tax_rate: 1.0
  retail_employment_share: 15
  sales_per_employee: 100000
  sales_tax_rate: 1.0
  cost_per_du: 5000
  cost_per_capita: 2000
  cost_per_employee: 1500

  # Agriculture — crop yield, pricing, resource use
  crop_yield_per_acre: 8.0
  crop_market_price_per_ton: 200
  crop_production_cost_per_acre: 800
  crop_water_per_acre_af: 3.0
  crop_labor_hours_per_acre: 15
  crop_truck_trips_per_acre: 2

