# Brew GIS DBT Project
# Analysis modules for urban planning and scenario modeling.

name: "brewgis"
version: "1.0.0"
config-version: 2

profile: "brewgis"

model-paths: ["models"]
macro-paths: ["macros"]
analysis-paths: []
test-paths: ["tests"]
seed-paths: ["seeds"]
snapshot-paths: []

clean-targets:
  - "target"
  - "dbt_packages"

models:
  brewgis:
    +materialized: "{{ var('base_canvas_materialized', 'view') }}"
    +schema: "{{ var('target_schema', 'public') }}"
    trip_distribution:
      +materialized: table
    mode_choice:
      +materialized: table
    internal_capture:
      +materialized: table
    transport_ghg:
      +materialized: table
    building_water_ghg:
      +materialized: table
    total_ghg:
      +materialized: view
    physical_activity:
      +materialized: table
    health_impacts:
      +materialized: table
    stormwater_runoff:
      +materialized: table
    tree_canopy:
      +materialized: table
    displacement_risk:
      +materialized: table
    displacement_risk_dynamic:
      +materialized: table
    food_access:
      +materialized: table
    housing_cost_burden:
    sprawl_index:
      +materialized: table
    scenario_summary:
      +materialized: table
    sprawl_cost:
      +materialized: table
    impute_area_proportional:
      +materialized: view
    vmt_fee:
      +materialized: table
    comparison:
      +materialized: table
      +schema: "{{ var('target_schema', 'public') }}"
    wac_block:
      +materialized: table
      +schema: lehd
    wac_block_raw:
      +materialized: table
      +schema: lehd
    acs_block_group:
      +materialized: table
      +schema: census
vars:
  # CBP County Scaling (wac_block model)
  cbp_preserve_fraction: 0.5
  cbp_county_retail_services: 0.0
  cbp_county_restaurant: 0.0
  cbp_county_accommodation: 0.0
  cbp_county_arts_entertainment: 0.0
  cbp_county_other_services: 0.0
  cbp_county_office_services: 0.0
  cbp_county_medical_services: 0.0
  cbp_county_public_admin: 0.0
  cbp_county_education: 0.0
  cbp_county_manufacturing: 0.0
  cbp_county_wholesale: 0.0
  cbp_county_transport_warehousing: 0.0
  cbp_county_utilities: 0.0
  cbp_county_construction: 0.0
  cbp_county_agriculture: 0.0
  cbp_county_extraction: 0.0
  # SACOG calibration ratios (set at runtime, null = CBP proportions)
  sacog_agriculture_ratio: null
  sacog_extraction_ratio: null
  sacog_construction_ratio: null
  sacog_manufacturing_ratio: null
  sacog_transport_warehousing_ratio: null
  sacog_utilities_ratio: null
  sacog_wholesale_ratio: null
  sacog_retail_services_ratio: null
  sacog_office_services_ratio: null
  sacog_education_ratio: null
  sacog_medical_services_ratio: null
  sacog_arts_entertainment_ratio: null
  sacog_accommodation_ratio: null
  sacog_restaurant_ratio: null
  sacog_other_services_ratio: null
  sacog_public_admin_ratio: null
  sacog_military_ratio: null
  # Default values for SQLFluff / dbt compilation.
  # Runtime values are provided by dbt_runner.py when executing models.
  parcel_table: parcels
  constraint_table: constraints
  built_form_table: built_forms
  source_schema: public
  target_schema: public
  scenario_id: lint
  base_canvas_table: base_canvas
  constraints: []
  nlcd_parcel_table: ""
  osm_intersection_table: ""


  # Land Consumption — parking and impervious defaults
  parking_per_unit: 0.5
  parking_per_employee: 0.2
  ground_coverage_factor: 0.6
  parking_space_sqft: 300
  row_fraction: 0.15

  # Fiscal Impact — assessed values, tax rates, service costs
  res_assessed_value_per_du: 350000
  nonres_assessed_value_per_sqft: 150
  property_tax_rate: 1.0
  retail_employment_share: 15
  sales_per_employee: 100000
  sales_tax_rate: 1.0
  cost_per_du: 5000
  cost_per_capita: 2000
  cost_per_employee: 1500

  # Agriculture — crop yield, pricing, resource use
  crop_yield_per_acre: 8.0
  crop_market_price_per_ton: 200
  crop_production_cost_per_acre: 800
  crop_water_per_acre_af: 3.0
  crop_labor_hours_per_acre: 15
  crop_truck_trips_per_acre: 2

  # Transportation — trip generation, distribution, mode choice, VMT (Phase 6a)
  transport_nonres_trip_rate: 42.94
  transport_pass_by_pct: 0.0
  transport_hbw_pct: 0.18
  transport_hbo_pct: 0.42
  transport_nhb_pct: 0.40
  transport_impedance_exponent: 2.0
  transport_attraction_employment_weight: 1.0
  transport_attraction_du_weight: 0.5
  transport_asc_transit: -2.0
  transport_asc_walk: -1.5
  transport_asc_bike: -2.5
  transport_beta_density: 0.15
  transport_beta_design_walk: 0.05
  transport_beta_transit_dist: 0.02
  transport_circuity_factor: 1.2
  transport_distance_source: euclidean  # "euclidean" or "network"
  # Transport Chain Quick Start (ROADMAP_2 Phase 1d)
  transport_quick_start: false  # Set true to use Euclidean distances + default rates
  transport_study_area_geometry: ""  # WKT polygon for internal capture
  transport_intrazonal_friction: 0.15

  # GHG Emissions — transportation, buildings, water (Phase 6b)
  transport_ghg_co2_per_mile: 0.411  # kg CO₂e/mi — EPA fleet average
  transport_ghg_fleet_mix: ""  # JSON: {"car": 0.65, "light_truck": 0.25, "heavy_truck": 0.10}
  transport_ghg_speed_adjust: false
  ghg_egrid_co2_per_kwh: 0.417  # kg CO₂e/kWh — US average eGRID
  ghg_gas_co2_per_kwh: 0.181  # kg CO₂e/kWh — natural gas
  ghg_water_supply_kwh_per_mg: 1427
  ghg_wastewater_kwh_per_mg: 1911

  # Public Health — physical activity, health impacts (Phase 6c)
  health_walk_met: 3.5
  health_bike_met: 6.0
  health_walk_speed_kmh: 4.8
  health_bike_speed_kmh: 16.0
  health_heat_mortality_reduction_pct: 8.0
  health_heat_baseline_met_hours_per_week: 11.25
  health_pm25_intake_fraction: 1.6e-6
  health_pm25_concentration_response: 0.0062
  health_background_dalys_per_capita: 0.013
  health_background_death_rate: 0.008

  # Stormwater Runoff (Phase 6d)
  stormwater_annual_precipitation_in: 12.0
  stormwater_method: simple  # "simple" or "rational"
  stormwater_runoff_coefficients: ""  # JSON: {"urban": 0.7, "compact": 0.85, ...}

  # Tree Canopy / Urban Heat Island (ROADMAP_2 Phase 2a)
  tree_canopy_baseline_temp: 95.0
  tree_canopy_temp_per_10pct: 1.0
  # Geometry Projection (ROADMAP_2 Phase 1b)
  projected_srid: null  # Set to e.g. 32611 (UTM zone 11N) for correct area calculations

  # VMT Mitigation Fee (ROADMAP_2 Phase 2b)
  vmt_fee_rate_dollars_per_vmt: 295.0
  vmt_exempt_pct: 0.0

  # Cost of Sprawl per Household (ROADMAP_2 Phase 2e)
  sprawl_infrastructure_cost_per_du: 15000  # Annual infrastructure cost per DU
  sprawl_capital_cost_per_du: 50000  # One-time capital cost per DU

seeds:
  brewgis:
    +schema: "{{ var('target_schema', 'public') }}"
    test_parcels:
      +column_types:
        geometry: geometry(Geometry,4326)
    test_sacog_parcels:
      +column_types:
        geometry: geometry(Geometry,4326)
        census_blockgroup: text
        census_block: text
    test_acs_block_group:
      +schema: census
      +column_types:
        geoid: text
        geometry: geometry(Geometry,4326)
    test_wac_block:
      +schema: lehd
      +column_types:
        geoid: text
        geometry: geometry(Geometry,4326)
    test_lodes_raw:
      +column_types:
        w_geocode: text
        year: integer
        c000: integer
        cns01: integer
        cns02: integer
        cns03: integer
        cns04: integer
        cns05: integer
        cns06: integer
        cns07: integer
        cns08: integer
        cns09: integer
        cns10: integer
        cns11: integer
        cns12: integer
        cns13: integer
        cns14: integer
        cns15: integer
        cns16: integer
        cns17: integer
        cns18: integer
        cns19: integer
        cns20: integer
    test_tiger_block_groups:
      +column_types:
        geoid: text
        geometry: geometry(Geometry,4326)
