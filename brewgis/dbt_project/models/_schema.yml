  - name: energy_total
    tests:
    - not_null
    - non_negative
  - name: energy_intensity_kwh_per_sqft
    tests:
    - non_negative
- name: water_demand
  description: Residential and non-residential water demand (liters/year) per parcel.
  columns:
  - name: parcel_id
    tests:
    - not_null
    - unique
  - name: gross_acres
    tests:
    - non_negative
  - name: acres_developed
    tests:
    - non_negative
  - name: water_demand_res_indoor
    tests:
    - non_negative
  - name: water_demand_res_outdoor
    tests:
    - non_negative
  - name: water_demand_nonres_indoor
    tests:
    - non_negative
  - name: water_demand_nonres_outdoor
    tests:
    - non_negative
  - name: water_demand_total
    tests:
    - not_null
    - non_negative
  - name: water_demand_per_unit
    tests:
    - non_negative
- name: fiscal_property_tax
  description: Property tax revenue from residential and non-residential assessed value.
  columns:
  - name: parcel_id
    tests:
    - not_null
    - unique
  - name: assessed_value_res
    tests:
    - non_negative
  - name: assessed_value_nonres
    tests:
    - non_negative
  - name: property_tax_revenue
    tests:
    - not_null
    - non_negative
- name: fiscal_sales_tax
  description: Sales tax revenue from retail employment.
  columns:
  - name: parcel_id
    tests:
    - not_null
    - unique
  - name: retail_sales
    tests:
    - non_negative
  - name: sales_tax_revenue
    tests:
    - not_null
    - non_negative
- name: fiscal_service_costs
  description: Public service costs — schools, public safety, roads/transit.
  columns:
  - name: parcel_id
    tests:
    - not_null
    - unique
  - name: service_cost_schools
    tests:
    - non_negative
  - name: service_cost_public_safety
    tests:
    - non_negative
  - name: service_cost_roads
    tests:
    - non_negative
  - name: service_cost_total
    tests:
    - not_null
    - non_negative
- name: fiscal_net_impact
  description: Net fiscal impact = property_tax_revenue + sales_tax_revenue - service_cost_total.
  columns:
  - name: parcel_id
    tests:
    - not_null
    - unique
    - relationships:
        to: ref('fiscal_property_tax')
        field: parcel_id
    - relationships:
        to: ref('fiscal_sales_tax')
        field: parcel_id
    - relationships:
        to: ref('fiscal_service_costs')
        field: parcel_id
  - name: property_tax_revenue
    tests:
    - not_null
    - non_negative
  - name: sales_tax_revenue
    tests:
    - not_null
    - non_negative
  - name: service_cost_total
    tests:
    - not_null
    - non_negative
  - name: net_fiscal_impact
    tests:
    - not_null
- name: base_canvas_geometry
  description: "Base canvas geometry — computes area columns from WKT geometry using PostGIS."
