    - non_negative
  - name: energy_electricity_nonres
    tests:
    - non_negative
  - name: energy_gas_nonres
    tests:
    - non_negative
  - name: energy_total
    tests:
    - not_null
    - non_negative
  - name: energy_intensity_kwh_per_sqft
    tests:
