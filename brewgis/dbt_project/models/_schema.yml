- name: sprawl_index
  description: Per-parcel compactness/sprawl index (0-100) from population density, intersection connectivity, and mixed-use score.
  columns:
  - name: parcel_id
    tests:
    - not_null
    - unique
  - name: gross_acres
    tests:
    - non_negative
  - name: population
    tests:
    - non_negative
  - name: population_density
    tests:
    - non_negative
  - name: intersection_density
    tests:
    - non_negative
  - name: sprawl_index
    tests:
    - not_null
