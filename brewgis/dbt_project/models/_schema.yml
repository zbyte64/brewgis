- name: allocation_factors
  description: "Area-weighted allocation factors between source and target geometries per overlapping pair."
  columns:
  - name: source_id
    description: "Source feature identifier"
    tests:
    - not_null
  - name: target_id
    description: "Target feature identifier"
    tests:
    - not_null
  - name: weight
    description: "Fraction of source area intersecting target (0, 1]"
    tests:
    - not_null
    - non_negative
    - column_between:
        arguments:
          min_value: 0
          max_value: 1

- name: allocation_apply
  description: "Allocated source column value per target row using area-weighted proportional allocation."
  columns:
  - name: target_ctid
    description: "Target row ctid for UPDATE matching"
    tests:
    - not_null
    - unique
  - name: allocated_value
    description: "Area-weighted sum of source column values allocated to this target row"
    tests:
    - not_null
- name: impute_area_proportional
  description: >
    Area-proportional imputation view. For each row in the target table,
    COALESCEs the existing value with an area-weighted allocation from
    intersecting source features. Returns (target_ctid, imputed_value) for
    every row — downstream consumers reference this view instead of an
    UPDATE'd table.
  columns:
  - name: target_ctid
    description: "Target row ctid for matching"
  - name: imputed_value
    description: "COALESCE of original value (if non-NULL) and area-weighted allocation"

- name: sacog_assessor_parcels
  description: >
    Deduplicated assessor parcel geometries — one row per apn (largest
    lotsize wins). Tests verify dedup produces unique apns.
  columns:
  - name: apn
    description: "Assessor parcel APN"
    tests:
    - not_null
    - unique
  - name: geometry
    description: "Parcel geometry (EPSG:4326)"
    tests:
    - not_null

- name: sacog_assessor_sales
  description: >
    Assessor building characteristics from sales records.
  columns:
  - name: apn
    description: "Assessor parcel APN (may be duplicated for multi-sale parcels)"
    tests:
    - not_null

- name: assessor_building_medians
  description: >
    Per-property-type median building characteristics from sales data.
  columns:
  - name: property_type
    description: "Property type (SFR, Condo, MF, Comm, Ind, Vacant, Other)"
    tests:
    - not_null
    - unique

- name: parcel_dasymetric_weights
  description: >
    Per-parcel dasymetric population and employment weights — one row per
    apn. Tests verify the unique constraint holds.
  columns:
  - name: apn
    description: "Assessor parcel APN"
    tests:
    - not_null
    - unique
