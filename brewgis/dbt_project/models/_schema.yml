version: 2
models:
- name: env_constraint
  description: Developable acres after applying environmental constraint discounts.
  columns:
  - name: parcel_id
    description: "Unique parcel identifier"
    tests:
    - not_null
    - unique
  - name: gross_acres
    description: "Total parcel area in acres"
    tests:
    - not_null
    - non_negative
  - name: acres_developable
    description: "Developable acres after constraint discounts"
    tests:
    - not_null
    - non_negative
  - name: developable_proportion
    description: "Ratio of developable to gross acres"
    tests:
    - column_between:
        arguments:
          min_value: 0
          max_value: 1
- name: core_end_state
  description: End-state allocation for each parcel with a built form assignment.
  columns:
  - name: parcel_id
    tests:
    - not_null
    - unique
  - name: gross_acres
    tests:
    - not_null
    - non_negative
- name: core_increment
  description: Delta (increment) between end-state and base canvas for each attribute.
  columns:
  - name: parcel_id
    tests:
    - not_null
    - unique
  - name: gross_acres
    tests:
    - non_negative
- name: trip_generation
  description: Daily trip generation per parcel using ITE trip generation rates.
  columns:
  - name: parcel_id
    tests:
    - not_null
    - unique
  - name: gross_acres
    tests:
    - non_negative
  - name: trips_total
    tests:
    - not_null
    - non_negative
  - name: trips_res
    tests:
    - non_negative
  - name: trips_nonres
    tests:
    - non_negative
  - name: trips_hbw
    tests:
    - non_negative
  - name: trips_hbo
    tests:
    - non_negative
  - name: trips_nhb
    tests:
    - non_negative
- name: trip_distribution
  description: Gravity model trip distribution — outbound, inbound, internal trips and average trip length.
  columns:
  - name: parcel_id
    tests:
    - not_null
    - unique
    - relationships:
        to: ref('trip_generation')
        field: parcel_id
  - name: trips_outbound
    tests:
    - not_null
    - non_negative
  - name: trips_inbound
    tests:
    - not_null
    - non_negative
  - name: trips_internal
    tests:
    - non_negative
  - name: avg_trip_length_km
    tests:
    - non_negative
- name: mode_choice
  description: Multinomial logit mode split producing trips and share by mode.
  columns:
  - name: parcel_id
    tests:
    - not_null
    - unique
    - relationships:
        to: ref('trip_distribution')
        field: parcel_id
  - name: trips_auto
    tests:
    - not_null
    - non_negative
  - name: trips_transit
    tests:
    - not_null
    - non_negative
  - name: trips_walk
    tests:
    - not_null
    - non_negative
  - name: trips_bike
    tests:
    - not_null
    - non_negative
  - name: mode_share_auto
    tests:
    - not_null
    - non_negative
    - column_between:
        arguments:
          min_value: 0
          max_value: 1
  - name: mode_share_transit
    tests:
    - non_negative
    - column_between:
        arguments:
          min_value: 0
          max_value: 1
  - name: mode_share_walk
    tests:
    - non_negative
    - column_between:
        arguments:
          min_value: 0
          max_value: 1
  - name: mode_share_bike
    tests:
    - non_negative
    - column_between:
        arguments:
          min_value: 0
          max_value: 1
  tests:
  - proportion_sum:
      arguments:
        columns:
        - mode_share_auto
        - mode_share_transit
        - mode_share_walk
        - mode_share_bike
        tolerance: 0.01
- name: vmt
  description: Vehicle miles traveled computed from mode choice and trip distribution.
  columns:
  - name: parcel_id
    tests:
    - not_null
    - unique
  - name: vmt_total
    tests:
    - not_null
    - non_negative
  - name: vmt_per_capita
    tests:
    - non_negative
  - name: auto_trips
    tests:
    - not_null
    - non_negative
  - name: avg_trip_length_mi
    tests:
    - non_negative
- name: land_consumption
  description: Land use transitions, acres consumed/preserved, impervious surface estimates.
  columns:
  - name: parcel_id
    tests:
    - not_null
    - unique
  - name: acres_consumed
    tests:
    - not_null
    - non_negative
  - name: acres_preserved
    tests:
    - non_negative
  - name: impervious_sqft
    tests:
    - non_negative
  - name: impervious_acres
    tests:
    - non_negative
  - name: pervious_acres
    tests:
    - non_negative
  - name: impervious_pct
    tests:
    - column_between:
        arguments:
          min_value: 0
          max_value: 100
- name: agriculture
  description: Agricultural output — crop yield, value, resource use for rural parcels.
  columns:
  - name: parcel_id
    tests:
    - not_null
    - unique
  - name: acres_cultivated
    tests:
