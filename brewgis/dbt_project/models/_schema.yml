          min_value: 0
          max_value: 1
  - name: mixed_use_score
    tests:
    - not_null
    - column_between:
        arguments:
          min_value: 0
          max_value: 1

- name: housing_cost_burden
  description: Housing cost burden per parcel — cost-burdened and severely cost-burdened households using configurable ACS-derived rates.
  columns:
  - name: parcel_id
    tests:
    - not_null
    - unique
  - name: gross_acres
    tests:
    - non_negative
  - name: population
    tests:
    - non_negative
  - name: households
    tests:
    - non_negative
  - name: dwelling_units_total
    tests:
    - non_negative
  - name: cost_burdened_hh
    tests:
    - not_null
    - non_negative
  - name: severely_cost_burdened_hh
    tests:
    - not_null
    - non_negative
  - name: cost_burden_pct
    tests:
    - not_null
    - non_negative
    - column_between:
        arguments:
          min_value: 0
          max_value: 100
  - name: cost_burden_category
    tests:
    - not_null
    - accepted_values:
        values: ['low_burden', 'cost_burdened', 'severely_cost_burdened']

- name: food_access
  description: Modified Retail Food Environment Index (mRFEI) per parcel — healthy vs unhealthy food retailer ratio.
  columns:
  - name: parcel_id
    tests:
    - not_null
    - unique
  - name: gross_acres
    tests:
    - non_negative
  - name: population
    tests:
    - non_negative
  - name: households
    tests:
    - non_negative
  - name: healthy_count
    tests:
    - not_null
    - non_negative
  - name: unhealthy_count
    tests:
    - not_null
    - non_negative
  - name: mrfei
    tests:
    - column_between:
        arguments:
          min_value: 0
          max_value: 100
  - name: food_desert
    tests:
    - not_null
  - name: food_access_category
    tests:
    - accepted_values:
        values: ['food_desert', 'low_access', 'moderate_access', 'high_access']
- name: displacement_risk
  description: Displacement risk/gentrification typology using equity indicators from base canvas.
  columns:
  - name: parcel_id
    tests:
    - not_null
    - unique
  - name: gross_acres
    tests:
    - non_negative
  - name: population
    tests:
    - non_negative
  - name: households
    tests:
    - non_negative
  - name: median_income
    tests:
    - non_negative
  - name: rent_burden_pct
    tests:
    - column_between:
        arguments:
          min_value: 0
          max_value: 100
  - name: pct_minority
    tests:
    - column_between:
        arguments:
          min_value: 0
          max_value: 100
  - name: pct_college_educated
    tests:
    - column_between:
        arguments:
          min_value: 0
          max_value: 100
  - name: vulnerability_score
    tests:
    - not_null
    - column_between:
        arguments:
          min_value: 0
          max_value: 4
  - name: displacement_risk_category
    tests:
    - not_null
    - accepted_values:
        values: ['stable', 'vulnerable', 'at_risk', 'displacement_pressure']
- name: tree_canopy
  description: "Tree canopy cover and urban heat island exposure per parcel."
  columns:
  - name: parcel_id
    tests: [not_null, unique]
  - name: gross_acres
    tests: [not_null, non_negative]
  - name: canopy_pct
    tests: [non_negative]
  - name: surface_temp_f
    tests: [non_negative]
  - name: heat_exposure_score
    tests: [non_negative]

- name: vmt_fee
  description: "VMT mitigation fee calculator — multiplies VMT by configurable fee rates."
  columns:
  - name: parcel_id
    tests: [not_null, unique]
  - name: vmt_total
    tests: [non_negative]
  - name: fee_revenue_total
