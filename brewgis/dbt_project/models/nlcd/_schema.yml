version: 2

models:
  - name: nlcd_parcel_stats
    description: >
      Per-parcel NLCD land cover zonal statistics. Computes majority
      land development category and area-weighted impervious fraction
      from the NLCD raster via PostGIS raster functions
      (ST_Clip, ST_ValueCount, ST_Reclass, ST_SummaryStats).
    columns:
      - name: parcel_id
        description: Unique parcel identifier.
        data_type: integer
        tests:
          - not_null
          - unique
      - name: land_development_category
        description: |
          Majority NLCD land development category:
          - urban: Developed land (classes 21-24)
          - agricultural: Pasture/Hay and Cultivated Crops (81-82)
          - natural: Forest (41-43), Shrub (51-52), Herbaceous (71-74), Barren (31)
          - water: Open Water and Perennial Ice/Snow (11-12)
          - wetland: Woody and Emergent Herbaceous Wetlands (90-95)
          - unknown: No majority class matched
        data_type: text
        tests:
          - not_null
          - accepted_values:
              values:
                - urban
                - agricultural
                - natural
                - water
                - wetland
                - unknown
      - name: impervious_fraction
        description: >
          Area-weighted NLCD-based impervious surface fraction. Uses
          ST_Reclass to map pixel values to fractions (21→0.10,
          22→0.30, 23→0.60, 24→0.85, 31→0.50) then ST_SummaryStats
          for area-weighted mean.
        data_type: double precision
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0.0
              max_value: 1.0
