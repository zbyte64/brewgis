volumes:
  brewgis_local_postgres_data: {}
  brewgis_local_postgres_data_backups: {}
  brewgis_local_redis_data: {}

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    image: brewgis_local_django
    container_name: brewgis_local_django
    depends_on:
      - postgres
      - redis
      - tipg
    volumes:
      - .:/app:z
      - ./cache:/home/dev-user/.cache/
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    ports:
      - '8000:8000'
    command: /start
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 48G
        reservations:
          cpus: '2'
          memory: 1G

  postgres:
    build:
      context: .
      dockerfile: ./compose/local/postgres/Dockerfile
    container_name: brewgis_local_postgres
    command:
      postgres
        -c work_mem=256MB -c shared_buffers=4GB -c effective_cache_size=12GB -c maintenance_work_mem=512MB
        -c max_parallel_workers_per_gather=6 -c max_parallel_workers=8
        -c parallel_tuple_cost=0.1 -c parallel_setup_cost=10
        -c wal_buffers=64MB -c max_wal_size=4GB -c min_wal_size=1GB
        -c max_connections=40
        -c random_page_cost=1.1 -c effective_io_concurrency=200 -c default_statistics_target=500

    shm_size: '4gb'
    ports:
      - '5432:5432'
    volumes:
      - brewgis_local_postgres_data:/var/lib/postgresql
      - brewgis_local_postgres_data_backups:/backups
    env_file:
      - ./.envs/.local/.postgres

  tipg:
    image: ghcr.io/developmentseed/tipg:latest
    container_name: brewgis_local_tipg
    environment:
      PORT: 8081
      TIPG_DEBUG: "True"
      TIPG_ROOT_PATH: /tipg
      TIPG_DB_SCHEMAS: '["public", "tiger"]'
      DATABASE_URL: postgresql://rADfmsnMjDXKephNGWFkfdPkuSAjdASF:glm5bKLmVKkfdJaM9qkDREdor4y8uSEJZKZvLVwP5jeEX6YSnw6DnNG9EYvupSlg@postgres:5432/brewgis
    ports:
      - 8081
    depends_on:
      - postgres

  martin:
    image: ghcr.io/maplibre/martin:1.8.2
    container_name: brewgis_local_martin
    command: --base-path /martin
    environment:
      DATABASE_URL: postgresql://rADfmsnMjDXKephNGWFkfdPkuSAjdASF:glm5bKLmVKkfdJaM9qkDREdor4y8uSEJZKZvLVwP5jeEX6YSnw6DnNG9EYvupSlg@postgres:5432/brewgis
    ports:
      - 3000
    depends_on:
      - postgres

  redis:
    image: docker.io/redis:6
    container_name: brewgis_local_redis

    volumes:
      - brewgis_local_redis_data:/data


  celeryworker:
    <<: *django
    image: brewgis_local_celeryworker
    container_name: brewgis_local_celeryworker
    depends_on:
      - redis
      - postgres
      - tipg
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: brewgis_local_celerybeat
    container_name: brewgis_local_celerybeat
    depends_on:
      - redis
      - postgres
    ports: []
    command: /start-celerybeat

  flower:
    <<: *django
    image: brewgis_local_flower
    container_name: brewgis_local_flower
    ports:
      - '5555:5555'
    command: /start-flower
  mcp:
    <<: *django
    image: brewgis_local_mcp
    container_name: brewgis_local_mcp
    depends_on:
      - redis
      - postgres
    ports:
      - '8002:8002'
    command: /start-mcp
  sqlmesh-ui:
    <<: *django
    image: brewgis_local_sqlmesh_ui
    container_name: brewgis_local_sqlmesh_ui
    depends_on:
      - postgres
    ports:
      - '8001:8001'
    command: /start-sqlmesh-ui
