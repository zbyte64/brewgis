# BrewGIS PostgreSQL Performance Configuration
# Tuned for Ryzen 9 7940HS (8C/16T), NVMe SSD, 32GB+ RAM

# Memory
shared_buffers = 4GB                    # 25% of RAM, default is 128MB
work_mem = 256MB                        # Allows in-memory sorts/hash joins for 510K-parcel queries
maintenance_work_mem = 512MB            # Index/VACUUM operations
effective_cache_size = 12GB             # Helps planner choose index scans

# Planner — SSD-optimized
random_page_cost = 1.1                  # NVMe SSD (default 4.0 is for HDD)
effective_io_concurrency = 200          # High parallelism for NVMe
default_statistics_target = 500         # Better plan estimates for 510K-row tables

# Parallel query — leverage 8 cores
max_parallel_workers_per_gather = 6
max_parallel_workers = 8
parallel_tuple_cost = 0.01
parallel_setup_cost = 100

# Write-ahead log — tuned for analytics (not OLTP)
wal_buffers = 64MB
max_wal_size = 4GB
min_wal_size = 1GB

# Connection
max_connections = 20                    # Well below default 100; saves memory
